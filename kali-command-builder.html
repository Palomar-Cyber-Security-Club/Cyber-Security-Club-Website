<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kali Linux Command Builder</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
  header { background: #161b22; border-bottom: 1px solid #30363d; padding: 12px 20px; display: flex; align-items: center; gap: 12px; }
  header svg { width: 32px; height: 32px; }
  header h1 { font-size: 18px; font-weight: 600; color: #e6edf3; }
  header span { font-size: 12px; color: #7d8590; margin-left: auto; }
  .layout { display: grid; grid-template-columns: 240px 1fr; height: calc(100vh - 57px); }
  .sidebar { background: #161b22; border-right: 1px solid #30363d; overflow-y: auto; }
  .cat-header { padding: 10px 14px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: #7d8590; border-bottom: 1px solid #21262d; background: #0d1117; position: sticky; top: 0; z-index: 1; }
  .cat-btn { display: flex; align-items: center; gap: 8px; width: 100%; padding: 9px 14px; background: none; border: none; color: #8b949e; cursor: pointer; font-size: 13px; text-align: left; transition: all 0.15s; border-left: 3px solid transparent; }
  .cat-btn:hover { background: #21262d; color: #c9d1d9; }
  .cat-btn.active { background: #1f2937; color: #58a6ff; border-left-color: #58a6ff; }
  .cat-btn .icon { width: 18px; font-size: 14px; text-align: center; }
  .main { display: flex; flex-direction: column; overflow: hidden; }
  .toolbar { padding: 12px 16px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; gap: 10px; align-items: center; }
  .search-box { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 7px 12px; color: #c9d1d9; font-size: 13px; }
  .search-box:focus { outline: none; border-color: #58a6ff; }
  .search-box::placeholder { color: #484f58; }
  .content-area { display: grid; grid-template-columns: 1fr 340px; flex: 1; overflow: hidden; }
  .tools-panel { overflow-y: auto; padding: 16px; }
  .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: #7d8590; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #21262d; }
  .tool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; margin-bottom: 20px; }
  .tool-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 10px 12px; cursor: pointer; transition: all 0.15s; }
  .tool-card:hover { border-color: #58a6ff; background: #1c2333; }
  .tool-card.selected { border-color: #58a6ff; background: #1c2333; box-shadow: 0 0 0 1px #58a6ff33; }
  .tool-name { font-size: 13px; font-weight: 600; color: #e6edf3; margin-bottom: 2px; }
  .tool-desc { font-size: 11px; color: #7d8590; line-height: 1.4; }
  .tool-badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 10px; margin-top: 5px; }
  .badge-scan { background: #1f3a5f; color: #58a6ff; }
  .badge-exploit { background: #3d1a1a; color: #f85149; }
  .badge-pass { background: #1a3d2b; color: #3fb950; }
  .badge-wifi { background: #2d1f5e; color: #a78bfa; }
  .badge-web { background: #3d2a1a; color: #e3b341; }
  .badge-forensics { background: #1a3d3d; color: #39d353; }
  .badge-recon { background: #1f3f3f; color: #2ea9a1; }
  .badge-misc { background: #30363d; color: #8b949e; }
  .right-panel { background: #161b22; border-left: 1px solid #30363d; display: flex; flex-direction: column; overflow: hidden; }
  .options-area { flex: 1; overflow-y: auto; padding: 14px; }
  .options-title { font-size: 12px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 12px; }
  .opt-group { margin-bottom: 14px; }
  .opt-label { font-size: 12px; color: #8b949e; margin-bottom: 5px; display: block; }
  .opt-input { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 7px 10px; color: #c9d1d9; font-size: 13px; }
  .opt-input:focus { outline: none; border-color: #58a6ff; }
  .opt-check { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; cursor: pointer; }
  .opt-check input[type=checkbox] { accent-color: #58a6ff; width: 14px; height: 14px; cursor: pointer; }
  .opt-check label { font-size: 13px; color: #c9d1d9; cursor: pointer; }
  .opt-check span.flag { font-size: 11px; color: #484f58; font-family: monospace; margin-left: auto; }
  .opt-select { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 7px 10px; color: #c9d1d9; font-size: 13px; }
  .opt-select:focus { outline: none; border-color: #58a6ff; }
  .cmd-area { background: #0d1117; border-top: 1px solid #30363d; padding: 12px 14px; }
  .cmd-label { font-size: 11px; color: #7d8590; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; }
  .cmd-box { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 10px 12px; font-family: 'Courier New', monospace; font-size: 13px; color: #79c0ff; word-break: break-all; min-height: 50px; line-height: 1.6; }
  .btn-row { display: flex; gap: 8px; margin-top: 10px; }
  .btn { padding: 7px 14px; border-radius: 6px; border: 1px solid #30363d; background: #21262d; color: #c9d1d9; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .btn:hover { background: #30363d; }
  .btn-primary { background: #1f6feb; border-color: #1f6feb; color: #fff; }
  .btn-primary:hover { background: #388bfd; border-color: #388bfd; }
  .btn-danger { background: #21262d; border-color: #f85149; color: #f85149; }
  .btn-danger:hover { background: #3d1a1a; }
  .placeholder { text-align: center; padding: 40px 20px; color: #484f58; }
  .placeholder svg { width: 48px; height: 48px; margin: 0 auto 12px; display: block; opacity: 0.3; }
  .placeholder p { font-size: 14px; }
  .no-results { padding: 30px; text-align: center; color: #484f58; font-size: 13px; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  .history-tag { display: inline-flex; align-items: center; gap: 5px; background: #21262d; border: 1px solid #30363d; border-radius: 20px; padding: 3px 10px; font-size: 11px; color: #8b949e; cursor: pointer; margin: 3px; transition: all 0.15s; }
  .history-tag:hover { border-color: #58a6ff; color: #58a6ff; }
  .history-section { padding: 10px 14px; border-top: 1px solid #21262d; }
  .history-section .sec-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: #484f58; margin-bottom: 6px; }
</style>
</head>
<body>

<header>
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="48" fill="#1a1a2e" stroke="#4a9fd4" stroke-width="3"/>
    <path d="M50 15 L75 35 L75 65 L50 85 L25 65 L25 35 Z" fill="none" stroke="#4a9fd4" stroke-width="2.5"/>
    <circle cx="50" cy="50" r="12" fill="#4a9fd4"/>
    <line x1="50" y1="15" x2="50" y2="38" stroke="#4a9fd4" stroke-width="2"/>
    <line x1="75" y1="35" x2="59" y2="44" stroke="#4a9fd4" stroke-width="2"/>
    <line x1="75" y1="65" x2="59" y2="56" stroke="#4a9fd4" stroke-width="2"/>
    <line x1="50" y1="85" x2="50" y2="62" stroke="#4a9fd4" stroke-width="2"/>
    <line x1="25" y1="65" x2="41" y2="56" stroke="#4a9fd4" stroke-width="2"/>
    <line x1="25" y1="35" x2="41" y2="44" stroke="#4a9fd4" stroke-width="2"/>
  </svg>
  <h1>Kali Linux Command Builder</h1>
  <span>Select a tool &rarr; configure options &rarr; copy command</span>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="cat-header">Categories</div>
    <div id="catList"></div>
  </div>
  <div class="main">
    <div class="toolbar">
      <input class="search-box" id="searchBox" placeholder="Search tools... (e.g. nmap, sqlmap, aircrack)" oninput="filterTools()">
      <button class="btn" onclick="clearAll()">Clear All</button>
    </div>
    <div class="content-area">
      <div class="tools-panel" id="toolsPanel"></div>
      <div class="right-panel">
        <div class="options-area" id="optionsArea">
          <div class="placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg>
            <p>Select a tool to configure options and build your command</p>
          </div>
        </div>
        <div class="cmd-area">
          <div class="cmd-label">
            <span>Generated Command</span>
            <span id="cmdStatus" style="color:#3fb950"></span>
          </div>
          <div class="cmd-box" id="cmdBox">Select a tool to get started...</div>
          <div class="btn-row">
            <button class="btn btn-primary" onclick="copyCmd()" style="flex:1">Copy Command</button>
            <button class="btn" onclick="addToHistory()">Save</button>
            <button class="btn btn-danger" onclick="resetOptions()">Reset</button>
          </div>
        </div>
        <div class="history-section" id="historySection" style="display:none">
          <div class="sec-lbl">Saved Commands</div>
          <div id="historyList"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>

let selectedTool = null;
let selectedCat = null;
let cmdHistory = [];

function init() {
  const catList = document.getElementById('catList');
  Object.entries(TOOLS).forEach(([cat, data]) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.innerHTML = `<span class="icon">${data.icon}</span>${cat}`;
    btn.onclick = () => selectCategory(cat, btn);
    catList.appendChild(btn);
  });
  selectCategory(Object.keys(TOOLS)[0], catList.querySelector('.cat-btn'));
}

function selectCategory(cat, el) {
  selectedCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderTools(cat);
  document.getElementById('searchBox').value = '';
}

function renderTools(cat, filter) {
  const panel = document.getElementById('toolsPanel');
  const tools = cat ? TOOLS[cat].tools : Object.values(TOOLS).flatMap(c => c.tools);
  const filtered = filter ? tools.filter(t => t.name.includes(filter) || t.desc.toLowerCase().includes(filter)) : tools;
  if (!filtered.length) { panel.innerHTML = '<div class="no-results">No tools found for that search.</div>'; return; }

  const groupBy = cat ? null : (() => {
    const map = {};
    Object.entries(TOOLS).forEach(([c, d]) => d.tools.forEach(t => map[t.name] = c));
    return map;
  })();

  if (cat && !filter) {
    panel.innerHTML = `<div class="section-title">${TOOLS[cat].icon} ${cat}</div><div class="tool-grid" id="toolGrid"></div>`;
    const grid = document.getElementById('toolGrid');
    filtered.forEach(t => grid.appendChild(makeCard(t)));
  } else {
    panel.innerHTML = '';
    const byCat = {};
    filtered.forEach(t => {
      const c = groupBy ? groupBy[t.name] : cat;
      if (!byCat[c]) byCat[c] = [];
      byCat[c].push(t);
    });
    Object.entries(byCat).forEach(([c, ts]) => {
      const sec = document.createElement('div');
      sec.innerHTML = `<div class="section-title">${TOOLS[c].icon} ${c}</div><div class="tool-grid"></div>`;
      ts.forEach(t => sec.querySelector('.tool-grid').appendChild(makeCard(t)));
      panel.appendChild(sec);
    });
  }
}

function makeCard(tool) {
  const card = document.createElement('div');
  card.className = 'tool-card' + (selectedTool && selectedTool.name === tool.name ? ' selected' : '');
  card.innerHTML = `<div class="tool-name">${tool.name}</div><div class="tool-desc">${tool.desc}</div><span class="tool-badge ${tool.badge}">${tool.badge.replace('badge-','')}</span>`;
  card.onclick = () => { selectTool(tool); document.querySelectorAll('.tool-card').forEach(c => c.classList.remove('selected')); card.classList.add('selected'); };
  return card;
}

function selectTool(tool) {
  selectedTool = tool;
  const area = document.getElementById('optionsArea');
  let html = `<div class="options-title">${tool.name} — options</div>`;
  tool.opts.forEach((opt, i) => {
    html += `<div class="opt-group">`;
    if (opt.type === 'input') {
      html += `<label class="opt-label">${opt.label}</label>
        <input class="opt-input" id="opt_${i}" placeholder="${opt.placeholder || ''}" oninput="buildCmd()">`;
    } else if (opt.type === 'check') {
      html += `<div class="opt-check"><input type="checkbox" id="opt_${i}" onchange="buildCmd()"><label for="opt_${i}">${opt.label}</label><span class="flag">${opt.flag}</span></div>`;
    } else if (opt.type === 'select') {
      html += `<label class="opt-label">${opt.label}</label>
        <select class="opt-select" id="opt_${i}" onchange="buildCmd()">
        ${opt.options.map(o => `<option value="${o}">${o}</option>`).join('')}
        </select>`;
    }
    html += '</div>';
  });
  area.innerHTML = html;
  buildCmd();
}

function buildCmd() {
  if (!selectedTool) return;
  const tool = selectedTool;
  let parts = [tool.name];

  tool.opts.forEach((opt, i) => {
    const el = document.getElementById(`opt_${i}`);
    if (!el) return;
    const val = el.type === 'checkbox' ? el.checked : el.value.trim();
    if (!val) return;

    if (opt.type === 'check') {
      if (val) parts.push(opt.flag);
    } else if (opt.type === 'input') {
      if (opt.key === 'target') { parts.push(val); }
      else if (opt.key === 'wordlist') { parts.push(val); }
      else if (opt.key === 'service') { parts.push(val); }
      else if (opt.key) { parts.push(val); }
      else if (opt.flag) {
        if (opt.flag.endsWith('=')) parts.push(`${opt.flag}${val}`);
        else parts.push(opt.flag, val);
      } else {
        parts.push(val);
      }
    } else if (opt.type === 'select') {
      const cleanVal = val.split(' ')[0];
      if (!cleanVal) return;
      if (opt.key === 'sub') { parts.splice(1, 0, cleanVal); }
      else if (opt.key === 'service') { parts.push(val.split(' ')[0]); }
      else if (opt.key === 'plugin') { parts.push(cleanVal); }
      else if (opt.key === 'mode') {
        const tv = val.replace('{HOST}', getVal('target')||'HOST').replace('{PORT}', getVal('port')||'PORT');
        parts.push(tv);
      } else if (opt.key === 'atk') { parts.push(val); }
      else if (opt.key === 'qtype') { parts.push(val); }
      else if (opt.flag) { parts.push(opt.flag, cleanVal.replace(/[()]/g,'')); }
      else { parts.push(cleanVal); }
    }
  });

  // Special assembly for some tools
  if (tool.name === 'hydra') {
    const target = getVal('target'); const service = getServiceVal();
    if (target && service) parts.push(`${service}://${target}`);
  }
  if (tool.name === 'airmon-ng') {
    const chan = getVal('chan');
    if (chan) { const ti = parts.indexOf(getVal('target')); if (ti > -1) parts.splice(ti+1, 0, chan); }
  }
  if (tool.name === 'dig') {
    const qt = getOptVal('qtype');
    if (qt) { const ui = parts.indexOf(getVal('target')); if (ui > -1) parts.splice(ui+1, 0, qt); }
  }
  if (tool.name === 'dd') {
    parts = ['dd'];
    tool.opts.forEach((opt, i) => {
      const el = document.getElementById(`opt_${i}`);
      if (!el) return;
      const val = el.type === 'checkbox' ? el.checked : el.value.trim();
      if (!val) return;
      if (opt.type === 'check') { if (val) parts.push(opt.flag); }
      else if (opt.flag) { parts.push(`${opt.flag}${val}`); }
    });
  }
  if (tool.name === 'crunch') {
    const min = getVal('min'), max = getVal('max'), cs = getVal('charset');
    parts = ['crunch'];
    if (min) parts.push(min);
    if (max) parts.push(max);
    if (cs) parts.push(cs);
    tool.opts.forEach((opt, i) => {
      if (opt.key) return;
      const el = document.getElementById(`opt_${i}`);
      if (!el) return;
      const val = el.value.trim();
      if (val && opt.flag) parts.push(opt.flag, val);
    });
  }

  const cmd = parts.filter(Boolean).join(' ');
  document.getElementById('cmdBox').textContent = cmd;
}

function getVal(key) {
  if (!selectedTool) return '';
  const i = selectedTool.opts.findIndex(o => o.key === key);
  if (i < 0) return '';
  const el = document.getElementById(`opt_${i}`);
  return el ? el.value.trim() : '';
}

function getOptVal(key) {
  if (!selectedTool) return '';
  const i = selectedTool.opts.findIndex(o => o.key === key);
  if (i < 0) return '';
  const el = document.getElementById(`opt_${i}`);
  return el ? el.value.trim() : '';
}

function getServiceVal() {
  if (!selectedTool) return '';
  const i = selectedTool.opts.findIndex(o => o.key === 'service');
  if (i < 0) {
    const si = selectedTool.opts.findIndex(o => o.label && o.label.toLowerCase().includes('service'));
    if (si >= 0) { const el = document.getElementById(`opt_${si}`); return el ? el.value.trim().split(' ')[0] : ''; }
    return '';
  }
  const el = document.getElementById(`opt_${i}`);
  return el ? el.value.trim().split(' ')[0] : '';
}

function filterTools() {
  const q = document.getElementById('searchBox').value.trim().toLowerCase();
  if (!q) { if (selectedCat) renderTools(selectedCat); else renderTools(null); return; }
  renderTools(null, q);
}

function copyCmd() {
  const cmd = document.getElementById('cmdBox').textContent;
  if (!cmd || cmd === 'Select a tool to get started...') return;
  navigator.clipboard.writeText(cmd).then(() => {
    const s = document.getElementById('cmdStatus');
    s.textContent = 'Copied!';
    setTimeout(() => s.textContent = '', 1800);
  });
}

function addToHistory() {
  const cmd = document.getElementById('cmdBox').textContent;
  if (!cmd || cmd === 'Select a tool to get started...') return;
  if (cmdHistory.includes(cmd)) return;
  cmdHistory.unshift(cmd);
  if (cmdHistory.length > 10) cmdHistory.pop();
  renderHistory();
}

function renderHistory() {
  const sec = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  if (!cmdHistory.length) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  list.innerHTML = cmdHistory.map((c, i) =>
    `<div class="history-tag" onclick="loadHistory(${i})" title="${c}">${c.split(' ')[0]} <small style="opacity:0.5">#${i+1}</small></div>`
  ).join('');
}

function loadHistory(i) {
  document.getElementById('cmdBox').textContent = cmdHistory[i];
}

function clearAll() {
  if (selectedTool) {
    selectedTool.opts.forEach((opt, i) => {
      const el = document.getElementById(`opt_${i}`);
      if (!el) return;
      if (el.type === 'checkbox') el.checked = false;
      else el.value = '';
    });
    buildCmd();
  }
  document.getElementById('searchBox').value = '';
  if (selectedCat) renderTools(selectedCat);
}

function resetOptions() { clearAll(); }

init();
</script>
</body>
</html>
